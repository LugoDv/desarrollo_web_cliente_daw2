<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulario de Inscripción</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <form id="inscripcionForm" action="procesar.php" method="POST">
      <fieldset>
        <legend>Datos Personales</legend>

        <label for="nombre">Nombre:</label>
        <input
          type="text"
          id="nombre"
          name="nombre"
          required
          placeholder="Escribe tu nombre"
        />

        <label for="email">Email:</label>
        <input
          type="email"
          id="email"
          name="email"
          required
          placeholder="tuemail@ejemplo.com"
        />

        <label for="password">Contraseña:</label>
        <input
          type="password"
          id="password"
          name="password"
          required
          placeholder="Mínimo 8 caracteres"
        />

        <label for="lenguaje">Lenguaje favorito:</label>
        <select id="lenguaje" name="lenguaje">
          <option value="HTML">HTML</option>
          <option value="JS">JavaScript</option>
          <option value="Python">Python</option>
        </select>

        <label for="motivacion">Motivación:</label>
        <textarea
          id="motivacion"
          name="motivacion"
          maxlength="200"
          placeholder="¿Por qué quieres inscribirte? (máx 200 caracteres)"
        ></textarea>

        <button type="submit">Enviar</button>
      </fieldset>
    </form>
    <script src="script.js"></script>
  </body>
</html>
