<!doctype html>
<html lang="">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title></title>
    <link href="style.css" rel="stylesheet" />
  </head>
  <body>
    <nav>
      <div class="nav-brand">
        <svg
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <rect x="3" y="3" width="18" height="18"></rect>
          <line x1="3" y1="9" x2="21" y2="9"></line>
          <line x1="9" y1="21" x2="9" y2="9"></line>
        </svg>
        <span>TO-DO</span>
      </div>
      <div class="clock" id="live-clock">00:00:00 pm</div>
    </nav>

    <main>
      <div class="content-wrapper">
        <header class="prompt-header">
          <h2>
            Hola <span id="username">Fabian</span> ,
            <span style="color: var(--accent)">Tareas pendientes</span>
          </h2>
          <div>
            <button type="button" class="btn-add btn-frase">frase</button>
          </div>
        </header>

        <div class="quote-card" id="quote-card">
          <div class="quote-meta">
            <span class="quote-category" id="quote-category">---</span>
          </div>
          <p class="quote-text" id="quote-text">Pulsa "frase" para obtener tu frase del dia.</p>
        </div>

        <section class="task-card">
          <form class="input-group" id="task-form">
            <input
              type="text"
              id="task-input"
              placeholder="Añadir tarea..."
              autocomplete="off"
            />
            <button type="submit" class="btn-add">
              <svg
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="3"
              >
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
              </svg>
            </button>
          </form>

          <ul id="task-list">
            <!-- Las tareas se inyectan aquí -->
          </ul>

          <div class="card-footer">
            <span id="pending-count">0 items pending</span>
            <span id="resize-info">System: Stable</span>
          </div>
        </section>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
